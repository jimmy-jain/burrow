name: test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    # Run on macos-14 (arm64) for regular pushes.
    # macos-13 (amd64) is covered by the release workflow build matrix.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install bats-core
        run: brew install bats-core

      - name: Run tests
        run: ./scripts/test.sh
