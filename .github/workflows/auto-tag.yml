name: auto-tag

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Skip if bump commit or no-op
        id: check_skip
        run: |
          COMMIT_MSG=$(git log -1 --format="%s")
          if echo "$COMMIT_MSG" | grep -q '\[skip ci\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: commit contains [skip ci]"
          elif echo "$COMMIT_MSG" | grep -q '^chore: bump version to'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: commit is a version bump"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version bump
        id: version
        if: steps.check_skip.outputs.skip == 'false'
        run: |
          # Get the latest V* tag
          LAST_TAG=$(git describe --tags --abbrev=0 --match "V*" 2>/dev/null || echo "V0.0.0")
          echo "Last tag: $LAST_TAG"

          # Check if HEAD is already the tagged commit — skip if so
          LAST_TAG_COMMIT=$(git rev-list -n 1 "$LAST_TAG" 2>/dev/null || echo "")
          HEAD_COMMIT=$(git rev-parse HEAD)
          if [ "$LAST_TAG_COMMIT" = "$HEAD_COMMIT" ]; then
            echo "HEAD is already tagged as $LAST_TAG — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get commits since last tag
          COMMITS=$(git log "${LAST_TAG}..HEAD" --format="%s %b" 2>/dev/null || echo "")

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LAST_TAG — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Determine bump type from conventional commits
          BUMP="patch"
          while IFS= read -r line; do
            # Breaking change: BREAKING CHANGE in body or ! after type
            if echo "$line" | grep -qE '(BREAKING CHANGE|^[a-z]+(\([^)]*\))?!:)'; then
              # Pre-1.0: treat breaking as minor
              BUMP="minor"
            fi
            # Feature: minor bump
            if echo "$line" | grep -qE '^feat(\([^)]*\))?[!:]'; then
              if [ "$BUMP" != "minor" ]; then
                BUMP="minor"
              fi
            fi
          done <<< "$COMMITS"

          echo "Bump type: $BUMP"

          # Parse current version (strip V prefix)
          CURRENT="${LAST_TAG#V}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          if [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

      - name: Bump version and tag
        if: steps.check_skip.outputs.skip == 'false' && steps.version.outputs.skip != 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          # Update VERSION line in burrow script
          sed -i '' "s/^VERSION=\"[0-9]*\.[0-9]*\.[0-9]*\"/VERSION=\"${NEW_VERSION}\"/" burrow

          # Verify the change was applied
          grep "^VERSION=" burrow

          # Configure git identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit and tag
          git add burrow
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git tag "V${NEW_VERSION}"
          git push origin main --tags
