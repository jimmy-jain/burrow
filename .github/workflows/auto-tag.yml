name: auto-tag

on:
  workflow_run:
    workflows: [check, test]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  auto-tag:
    # Only proceed when the triggering workflow succeeded.
    # We then verify the OTHER workflow also passed for the same SHA.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: macos-14
    steps:
      - name: Verify both check and test passed for this SHA
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          check_ok=$(gh api "repos/${REPO}/actions/workflows/check.yml/runs" \
            --jq "[.workflow_runs[] | select(.head_sha == \"${SHA}\" and .status == \"completed\")] | first | .conclusion" \
            2>/dev/null || echo "")
          test_ok=$(gh api "repos/${REPO}/actions/workflows/test.yml/runs" \
            --jq "[.workflow_runs[] | select(.head_sha == \"${SHA}\" and .status == \"completed\")] | first | .conclusion" \
            2>/dev/null || echo "")
          echo "check: $check_ok, test: $test_ok"
          if [ "$check_ok" = "success" ] && [ "$test_ok" = "success" ]; then
            echo "gate=pass" >> "$GITHUB_OUTPUT"
          else
            echo "gate=fail" >> "$GITHUB_OUTPUT"
            echo "Both check and test must succeed — skipping"
          fi

      - name: Checkout
        if: steps.gate.outputs.gate == 'pass'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ github.token }}

      - name: Skip if bump commit
        id: check_skip
        if: steps.gate.outputs.gate == 'pass'
        run: |
          COMMIT_MSG=$(git log -1 --format="%s")
          if echo "$COMMIT_MSG" | grep -q '\[skip ci\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: commit contains [skip ci]"
          elif echo "$COMMIT_MSG" | grep -q '^chore: bump version to'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: commit is a version bump"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version bump
        id: version
        if: steps.gate.outputs.gate == 'pass' && steps.check_skip.outputs.skip == 'false'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match "V*" 2>/dev/null || echo "V0.0.0")
          echo "Last tag: $LAST_TAG"

          LAST_TAG_COMMIT=$(git rev-list -n 1 "$LAST_TAG" 2>/dev/null || echo "")
          HEAD_COMMIT=$(git rev-parse HEAD)
          if [ "$LAST_TAG_COMMIT" = "$HEAD_COMMIT" ]; then
            echo "HEAD is already tagged as $LAST_TAG — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMITS=$(git log "${LAST_TAG}..HEAD" --format="%s %b" 2>/dev/null || echo "")
          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LAST_TAG — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          BUMP="patch"
          while IFS= read -r line; do
            if echo "$line" | grep -qE '(BREAKING CHANGE|^[a-z]+(\([^)]*\))?!:)'; then
              BUMP="minor"
            fi
            if echo "$line" | grep -qE '^feat(\([^)]*\))?[!:]'; then
              [ "$BUMP" != "minor" ] && BUMP="minor"
            fi
          done <<< "$COMMITS"

          echo "Bump type: $BUMP"

          CURRENT="${LAST_TAG#V}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          if [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version and tag
        if: steps.gate.outputs.gate == 'pass' && steps.check_skip.outputs.skip == 'false' && steps.version.outputs.skip != 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          sed -i '' "s/^VERSION=\"[0-9]*\.[0-9]*\.[0-9]*\"/VERSION=\"${NEW_VERSION}\"/" burrow
          grep "^VERSION=" burrow
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add burrow
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git tag "V${NEW_VERSION}"
          git push origin main --tags
