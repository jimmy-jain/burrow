name: release

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
    tags:
      - "V*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  check-shell:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install shell tools
        run: brew install shellcheck

      - name: Run shell and syntax checks
        env:
          CI: "true"
        run: ./scripts/check.sh --no-format

  check-go-lint:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --config .golangci.yml ./...

  check:
    if: ${{ always() }}
    needs: [check-shell, check-go-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Verify check jobs
        run: |
          echo "check-shell: ${{ needs.check-shell.result }}"
          echo "check-go-lint: ${{ needs.check-go-lint.result }}"
          [ "${{ needs.check-shell.result }}" = "success" ]
          [ "${{ needs.check-go-lint.result }}" = "success" ]

  test-bats:
    name: test-bats (${{ matrix.shard_name }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_name: shard-1
            shard_mode: main
            shard_index: "0"
            shard_total: "4"
          - shard_name: shard-2
            shard_mode: main
            shard_index: "1"
            shard_total: "4"
          - shard_name: shard-3
            shard_mode: main
            shard_index: "2"
            shard_total: "4"
          - shard_name: shard-4
            shard_mode: main
            shard_index: "3"
            shard_total: "4"
          - shard_name: perf
            shard_mode: perf
            shard_index: "0"
            shard_total: "1"
    permissions:
      contents: read
    env:
      BURROW_TEST_NO_AUTH: "1"
      TERM: xterm-256color
      BATS_FORMATTER: tap
      BATS_SHARD_NAME: ${{ matrix.shard_name }}
      BATS_SHARD_MODE: ${{ matrix.shard_mode }}
      BATS_SHARD_INDEX: ${{ matrix.shard_index }}
      BATS_SHARD_TOTAL: ${{ matrix.shard_total }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install test tools
        run: brew install bats-core parallel

      - name: Run BATS suites
        run: |
          fd_available=0
          zip_available=0
          zip_list_available=0
          command -v fd > /dev/null 2>&1 && fd_available=1
          command -v zip > /dev/null 2>&1 && zip_available=1
          if command -v zipinfo > /dev/null 2>&1 || command -v unzip > /dev/null 2>&1; then
            zip_list_available=1
          fi
          export FD_AVAILABLE="$fd_available"
          export ZIP_AVAILABLE="$zip_available"
          export ZIP_LIST_AVAILABLE="$zip_list_available"

          bats_opts=()
          if command -v parallel > /dev/null 2>&1 && bats --help 2>&1 | grep -q -- "--jobs"; then
            _ncpu="$(sysctl -n hw.logicalcpu 2> /dev/null || echo 4)"
            _jobs="$((_ncpu > 6 ? 6 : (_ncpu < 2 ? 2 : _ncpu)))"
            bats_opts+=("--jobs" "$_jobs" "--no-parallelize-within-files")
          fi

          perf_file="tests/core_performance.bats"
          SHARD_FILES=()
          while IFS= read -r file; do
            [[ -n "$file" ]] && SHARD_FILES+=("$file")
          done < <(
            python3 - <<'PY'
            import os
            import pathlib
            import re

            fd_available = os.environ.get("FD_AVAILABLE", "0") == "1"
            zip_available = os.environ.get("ZIP_AVAILABLE", "0") == "1"
            zip_list_available = os.environ.get("ZIP_LIST_AVAILABLE", "0") == "1"
            shard_mode = os.environ.get("BATS_SHARD_MODE", "main")
            shard_index = int(os.environ.get("BATS_SHARD_INDEX", "0"))
            shard_total = int(os.environ.get("BATS_SHARD_TOTAL", "1"))

            root = pathlib.Path("tests")
            perf_file = root / "core_performance.bats"

            if shard_mode == "perf":
                if perf_file.exists():
                    print(str(perf_file))
                raise SystemExit(0)

            files = []
            for path in sorted(root.rglob("*.bats")):
                rel = path.as_posix()
                if rel == perf_file.as_posix():
                    continue
                if rel == "tests/installer_fd.bats" and not fd_available:
                    continue
                if rel == "tests/installer_zip.bats" and not (zip_available and zip_list_available):
                    continue
                text = path.read_text(errors="ignore")
                count = len(re.findall(r"^@test\b", text, re.M))
                files.append((count, rel))

            bucket_counts = [0] * shard_total
            bucket_files = [[] for _ in range(shard_total)]

            for count, rel in sorted(files, key=lambda item: (-item[0], item[1])):
                target = min(range(shard_total), key=lambda idx: (bucket_counts[idx], idx))
                bucket_files[target].append(rel)
                bucket_counts[target] += count

            for rel in bucket_files[shard_index]:
                print(rel)
            PY
          )

          if [[ ${#SHARD_FILES[@]} -eq 0 ]]; then
            echo "No BATS files assigned to shard ${BATS_SHARD_NAME}"
            exit 0
          fi

          printf 'Running BATS shard %s with %s file(s)\n' "$BATS_SHARD_NAME" "${#SHARD_FILES[@]}"
          printf ' - %s\n' "${SHARD_FILES[@]}"
          bats "${bats_opts[@]}" --formatter tap "${SHARD_FILES[@]}"

  test-go:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Go build, vet, and tests
        env:
          BURROW_GO_TEST_CACHE: /tmp/burrow-go-build-cache
        run: |
          mkdir -p "$BURROW_GO_TEST_CACHE"
          GOCACHE="$BURROW_GO_TEST_CACHE" go build ./...
          GOCACHE="$BURROW_GO_TEST_CACHE" go vet ./cmd/...
          GOCACHE="$BURROW_GO_TEST_CACHE" go test ./cmd/...

  test-smoke:
    runs-on: macos-14
    permissions:
      contents: read
    env:
      BURROW_TEST_NO_AUTH: "1"
      TERM: xterm-256color
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install shell smoke prerequisites
        run: brew install shellcheck

      - name: Test module loading
        run: bash -c 'source lib/core/common.sh && echo "OK"' > /dev/null

      - name: Run integration syntax checks
        run: |
          bash -n burrow
          bash -n bin/clean.sh
          bash -n bin/optimize.sh

      - name: Run installation smoke test
        env:
          BW_NO_OPLOG: "1"
        run: |
          install_test_home="$(mktemp -d /tmp/burrow-test-home.XXXXXX 2> /dev/null || true)"
          if [[ -z "$install_test_home" ]]; then
            install_test_home="/tmp/burrow-test-home"
            mkdir -p "$install_test_home"
          fi

          cleanup() {
            rm -rf /tmp/burrow-test "$install_test_home" 2> /dev/null || true
          }
          trap cleanup EXIT

          HOME="$install_test_home" \
          XDG_CONFIG_HOME="$install_test_home/.config" \
          XDG_CACHE_HOME="$install_test_home/.cache" \
          ./install.sh --prefix /tmp/burrow-test > /dev/null 2>&1

          test -f /tmp/burrow-test/burrow

  test:
    if: ${{ always() }}
    needs: [test-bats, test-go, test-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Verify test jobs
        run: |
          echo "test-bats: ${{ needs.test-bats.result }}"
          echo "test-go: ${{ needs.test-go.result }}"
          echo "test-smoke: ${{ needs.test-smoke.result }}"
          [ "${{ needs.test-bats.result }}" = "success" ]
          [ "${{ needs.test-go.result }}" = "success" ]
          [ "${{ needs.test-smoke.result }}" = "success" ]

  tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check, test]
    runs-on: macos-14
    outputs:
      release_created: ${{ steps.create_release.outputs.release_created }}
      release_tag: ${{ steps.create_release.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main
          token: ${{ github.token }}

      - name: Skip bump commits
        id: skip
        run: |
          COMMIT_MSG=$(git log -1 --format="%s")
          if echo "$COMMIT_MSG" | grep -q '\[skip ci\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -q '^chore: bump version to'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version bump
        id: version
        if: steps.skip.outputs.skip == 'false'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match "V*" 2>/dev/null || echo "V0.0.0")
          LAST_TAG_COMMIT=$(git rev-list -n 1 "$LAST_TAG" 2>/dev/null || echo "")
          HEAD_COMMIT=$(git rev-parse HEAD)

          if [ "$LAST_TAG_COMMIT" = "$HEAD_COMMIT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMITS=$(git log "${LAST_TAG}..HEAD" --format="%s %b" 2>/dev/null || echo "")
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          BUMP="patch"
          while IFS= read -r line; do
            if echo "$line" | grep -qE '(BREAKING CHANGE|^[a-z]+(\([^)]*\))?!:)'; then
              BUMP="minor"
            fi
            if echo "$line" | grep -qE '^feat(\([^)]*\))?[!:]'; then
              [ "$BUMP" != "minor" ] && BUMP="minor"
            fi
          done <<< "$COMMITS"

          CURRENT="${LAST_TAG#V}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          if [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version and tag
        id: create_release
        if: steps.skip.outputs.skip == 'false' && steps.version.outputs.skip != 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          sed -i '' "s/^VERSION=\"[0-9]*\.[0-9]*\.[0-9]*\"/VERSION=\"${NEW_VERSION}\"/" burrow
          grep "^VERSION=" burrow

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add burrow
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git tag "V${NEW_VERSION}"
          git push origin HEAD:main "refs/tags/V${NEW_VERSION}"
          echo "release_created=true" >> "$GITHUB_OUTPUT"
          echo "release_tag=V${NEW_VERSION}" >> "$GITHUB_OUTPUT"

  build:
    if: >
      always() &&
      needs.check.result == 'success' &&
      needs.test.result == 'success' &&
      (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/V')) ||
        needs.tag.outputs.release_created == 'true'
      )
    needs: [check, test, tag]
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-13
            arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Determine release tag
        id: release
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/V* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.tag.outputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout release ref
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          git fetch --force --tags origin
          git checkout --force "${RELEASE_TAG}"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: make release-${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.arch }}
          path: bin/*-darwin-${{ matrix.arch }}
          if-no-files-found: error

  publish:
    if: >
      always() &&
      needs.build.result == 'success' &&
      (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/V')) ||
        needs.tag.outputs.release_created == 'true'
      )
    needs: [build, tag]
    runs-on: ubuntu-latest
    steps:
      - name: Determine release tag
        id: release
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/V* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.tag.outputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout release ref
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          git fetch --force --tags origin
          git checkout --force "${RELEASE_TAG}"

      - name: Download arm64 binaries
        uses: actions/download-artifact@v8
        with:
          name: binaries-arm64
          path: dist/arm64

      - name: Download amd64 binaries
        uses: actions/download-artifact@v8
        with:
          name: binaries-amd64
          path: dist/amd64

      - name: Generate release notes
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 --match "V*" "${TAG}^" 2> /dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" --no-merges > release_notes.txt
          else
            git log "${TAG}" --pretty=format:"- %s" --no-merges > release_notes.txt
          fi

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          chmod +x dist/arm64/* dist/amd64/* 2> /dev/null || true
          gh release create "${TAG}" \
            --title "Burrow ${TAG}" \
            --notes-file release_notes.txt \
            dist/arm64/* \
            dist/amd64/*
