name: Nightly

on:
  push:
    branches: [dev]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Install tools
        run: brew install bats-core shellcheck

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v5
        with:
          go-version-file: go.mod

      - name: Run all tests
        env:
          BURROW_PERF_BYTES_TO_HUMAN_LIMIT_MS: "6000"
          BURROW_PERF_GET_FILE_SIZE_LIMIT_MS: "3000"
          BATS_FORMATTER: tap
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
        run: ./scripts/test.sh

  build:
    name: Build
    needs: test
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: release-amd64
            arch: amd64
          - target: release-arm64
            arch: arm64
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: make ${{ matrix.target }}

      - name: Verify built binaries
        run: |
          for bin in bin/*-darwin-*; do
            file "$bin" | grep -q "Mach-O" || { echo "Invalid binary: $bin"; exit 1; }
            echo "  $bin"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: nightly-${{ matrix.arch }}
          path: bin/*-darwin-*
          retention-days: 5

  publish:
    name: Publish Nightly
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: bin
          pattern: nightly-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd bin
          sha256sum *-darwin-* > SHA256SUMS
          cat SHA256SUMS

      - name: Delete previous nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Create nightly release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: nightly
          name: Nightly
          body: |
            Automated nightly build from the `dev` branch.

            Install via:
            ```bash
            curl -fsSL https://raw.githubusercontent.com/jimmy-jain/burrow/dev/install.sh | BURROW_VERSION=main bash
            ```
          files: bin/*
          prerelease: true
          target_commitish: dev
